# Render deployment config for xend
# Adjust branch, plan, and secret management as needed in Render dashboard.

services:
  - type: web
    name: paybot-backend
    env: docker
    plan: starter
    repo: https://github.com/PayBot-PH/paybot
    branch: main
    dockerfilePath: Dockerfile
    autoDeploy: true
    instances: 1
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        value: replace-with-production-telegram-bot-token
      - key: TELEGRAM_BOT_USERNAME
        value: replace-with-production-telegram-username
      - key: TELEGRAM_ADMIN_IDS
        value: replace-with-production-admin-user-id
      - key: JWT_SECRET_KEY
        value: replace-with-production-jwt-secret
      - key: XENDIT_SECRET_KEY
        value: replace-with-production-xendit-secret
      - key: PAYMONGO_SECRET_KEY
        value: replace-with-production-paymongo-secret
      - key: PAYMONGO_PUBLIC_KEY
        value: replace-with-production-paymongo-public-key
      - key: MAGPIE_API_KEY
        value: replace-with-production-magpie-api-key
      - key: MAGPIE_WEBHOOK_SECRET
        value: replace-with-production-magpie-webhook-secret
      - key: MAGPIE_MODE
        value: live
      - key: MAGPIE_BASE_URL
        value: https://api.magpie.im
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.example

databases:
  - name: paybot-db
    plan: starter

jobs:
  - name: migrate-database
    type: job
    env: docker
    plan: starter
    repo: https://github.com/PayBot-PH/paybot
    branch: main
    dockerfilePath: Dockerfile
    command: alembic -c backend/alembic.ini upgrade head
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
