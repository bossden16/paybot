<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0; url=/magpie-success" />
    <script>
      // Preserve the query string and forward to the frontend route.
      (function(){
        try {
          var qs = window.location.search || '';
          var target = '/magpie-success' + qs;
          // Use replace so back button doesn't return here
          window.location.replace(target);
        } catch (e) {
          // noop
        }
      })();
    </script>
    <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0f172a;color:#e6eef8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}a{color:#60a5fa}</style>
  </head>
  <body>
    <div>
      <p>Redirecting to <a href="/magpie-success">/magpie-success</a>. If you are not redirected, click the link.</p>
    </div>
  </body>
</html>
