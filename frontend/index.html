<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xend - Payment Dashboard</title>
    <style>
      /* Force dark background immediately */
      html, body { background: #0f172a; margin: 0; padding: 0; color: white; font-family: sans-serif; height: 100%; width: 100%; overflow: hidden; }

      #boot-console {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f172a; transition: opacity 0.5s ease;
      }
      .loader-ring {
        width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #3b82f6;
        border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px;
      }
      #boot-status { font-size: 14px; font-weight: 600; color: #64748b; letter-spacing: 0.1em; }
      @keyframes spin { to { transform: rotate(360deg); } }

      #fatal-error { display: none; position: fixed; inset: 0; z-index: 10000; background: #7f1d1d; color: #fecaca; padding: 40px; overflow: auto; }
    </style>
    <script>
      // Diagnostic bridge
      window.XEND_LOG = function(m) {
        console.log('[boot]', m);
        var el = document.getElementById('boot-status');
        if (el) el.innerText = m.toUpperCase() + '...';
      };
      window.XEND_FATAL = function(m, e) {
        console.error('[fatal]', m, e);
        var el = document.getElementById('fatal-error');
        if (el) {
          el.style.display = 'block';
          el.innerHTML = '<h1>SYSTEM_FATAL_ERROR</h1><p>The application failed to initialize.</p>' +
            '<div style="background:rgba(0,0,0,0.4);padding:20px;border-radius:8px;font-family:monospace;font-size:12px;">' +
            m + '<br><br>' + (e ? (e.stack || e) : '') + '</div>';
        }
      };
      window.onerror = function(m, u, l, c, e) { window.XEND_FATAL(m, e); };
      window.onunhandledrejection = function(e) { window.XEND_FATAL(e.reason); };
    </script>
  </head>
  <body>
    <div id="boot-console">
      <div class="loader-ring"></div>
      <div id="boot-status">INITIALIZING...</div>
    </div>
    <div id="fatal-error"></div>
    <div id="root"></div>
    <!-- Script path is absolute to prevent relative resolution issues on nested routes -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
