name: Purge sensitive files from repository history

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type the exact phrase 'I understand' to proceed with the irreversible purge"
        required: true
        default: ""

jobs:
  purge:
    name: Purge history (requires FILTER_REPO_PAT secret)
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        id: confirm
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "I understand" ]; then
            echo "Confirmation mismatch. Aborting." >&2
            exit 1
          fi

      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: |
          python -m pip install --upgrade pip
          python -m pip install git-filter-repo

      - name: Configure git user
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Create backup branch (pre-purge)
        env:
          PAT: ${{ secrets.FILTER_REPO_PAT }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          BACKUP_BRANCH=pre-purge-backup-${TIMESTAMP}
          echo "Creating backup branch: ${BACKUP_BRANCH}"
          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git HEAD:refs/heads/${BACKUP_BRANCH}
          echo "Backup branch created: ${BACKUP_BRANCH}"

      - name: Mirror-clone repository
        env:
          PAT: ${{ secrets.FILTER_REPO_PAT }}
        run: |
          mkdir -p /tmp/clean-repo
          git clone --mirror https://x-access-token:${PAT}@github.com/${{ github.repository }}.git /tmp/clean-repo

      - name: Run git-filter-repo to remove sensitive files
        env:
          FILTER_FILES: |
            RSA.pem
            merchant_private.pem
            merchant_private_pkcs8.pem
            merchant_public.pem
            private_key_env.txt
            paybot-pos-terminal-live.apk
        run: |
          cd /tmp/clean-repo
          echo "Removing the following paths from history:"
          echo "$

