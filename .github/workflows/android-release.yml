name: Build Android Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # RN 0.73/0.72 works best with Node 18 or 20

      - name: Install dependencies
        working-directory: mobile/android
        run: npm install

      - name: Patch react-native-camera build config
        run: |
          python3 - <<'PY'
import pathlib, re
# The actual Android project is at mobile/android/android
target = pathlib.Path('mobile/android/android/app/build.gradle')
if target.exists():
    text = target.read_text()
    if 'missingDimensionStrategy' not in text:
        lines = text.splitlines()
        out = []
        inserted = False
        for line in lines:
            out.append(line)
            if not inserted and re.match(r'^\s*defaultConfig\s*\{', line):
                out.append("        missingDimensionStrategy 'react-native-camera', 'general'")
                inserted = True
        if inserted:
            target.write_text('\n'.join(out) + '\n')
PY

      - name: Decode Android keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then echo "ANDROID_KEYSTORE_BASE64 secret is missing"; exit 1; fi
          mkdir -p mobile/android/android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/android/app/my-release-key.keystore

      - name: Write signing properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ] || [ -z "${KEY_PASSWORD}" ]; then echo "One or more signing secrets are missing"; exit 1; fi
          TARGET_DIR=mobile/android/android
          cat > "$TARGET_DIR/gradle.properties" <<EOF
MYAPP_UPLOAD_STORE_FILE=my-release-key.keystore
MYAPP_UPLOAD_STORE_PASSWORD=${KEYSTORE_PASSWORD}
MYAPP_UPLOAD_KEY_ALIAS=${KEY_ALIAS}
MYAPP_UPLOAD_KEY_PASSWORD=${KEY_PASSWORD}
EOF

      - name: Make gradlew executable
        run: chmod +x mobile/android/android/gradlew

      - name: Build release APK
        working-directory: mobile/android/android
        run: ./gradlew assembleRelease --no-daemon -Pandroid.injected.signing.store.file=app/my-release-key.keystore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile/android/android/app/build/outputs/apk/release/app-release.apk
